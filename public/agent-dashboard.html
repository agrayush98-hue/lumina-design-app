<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumina CI/CD — Agent Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   rgba(255,255,255,0.08);
    --text:     #f0f0f0;
    --muted:    rgba(255,255,255,0.45);
    --dim:      rgba(255,255,255,0.22);
    --gold:     #d4a843;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #f59e0b;
    --blue:     #3b82f6;
    --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    --mono:     'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 32px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }
  header .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--gold);
  }
  header .title {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  header .spacer { flex: 1; }
  #connection-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  #connection-badge.connected { background: rgba(34,197,94,0.12); color: var(--green); border-color: rgba(34,197,94,0.3); }
  #elapsed {
    font-size: 11px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  /* ── Layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 0;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
  }
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
  }
  .left { display: flex; flex-direction: column; gap: 20px; }
  .right { display: flex; flex-direction: column; gap: 20px; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .card-header .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card-body { padding: 18px; }

  /* ── Agent cards ── */
  .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .agent-card.running  { border-color: var(--blue); }
  .agent-card.pass     { border-color: rgba(34,197,94,0.40); }
  .agent-card.fail     { border-color: rgba(239,68,68,0.40); }
  .agent-card.pending  { opacity: 0.55; }

  .agent-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .agent-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }
  .agent-card.running  .agent-icon { background: rgba(59,130,246,0.15); }
  .agent-card.pass     .agent-icon { background: rgba(34,197,94,0.12); }
  .agent-card.fail     .agent-icon { background: rgba(239,68,68,0.12); }

  .agent-name  { font-size: 13px; font-weight: 600; }
  .agent-label { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .agent-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--dim);
  }
  .agent-card.running  .agent-badge { background: rgba(59,130,246,0.15); color: var(--blue); }
  .agent-card.pass     .agent-badge { background: rgba(34,197,94,0.12);  color: var(--green); }
  .agent-card.fail     .agent-badge { background: rgba(239,68,68,0.12);  color: var(--red); }

  /* Progress bar */
  .progress-wrap {
    height: 2px;
    background: rgba(255,255,255,0.05);
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--blue);
    transition: width 0.4s ease, background 0.3s;
  }
  .agent-card.pass .progress-bar { background: var(--green); width: 100% !important; }
  .agent-card.fail .progress-bar { background: var(--red);   width: 100% !important; }

  /* Log lines inside agent card */
  .agent-logs {
    padding: 12px 18px;
    max-height: 120px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .agent-logs .log-line { white-space: pre-wrap; word-break: break-all; }
  .agent-logs .log-line.critical { color: var(--red); }
  .agent-logs .log-line.warn     { color: var(--yellow); }
  .agent-logs .log-line.ok       { color: var(--green); }

  /* ── Decision banner ── */
  #decision-banner {
    display: none;
    padding: 20px 24px;
    border-radius: 8px;
    border: 1px solid;
    align-items: center;
    gap: 16px;
  }
  #decision-banner.approved { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.35); }
  #decision-banner.rejected { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.35); }
  #decision-icon { font-size: 28px; flex-shrink: 0; }
  #decision-title { font-size: 16px; font-weight: 700; }
  #decision-reason { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── Stats grid ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .stat-cell { text-align: center; }
  .stat-num  { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-lbl  { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .stat-num.red    { color: var(--red); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-num.green  { color: var(--green); }
  .stat-num.blue   { color: var(--blue); }

  /* ── Issues list ── */
  #issues-list { display: flex; flex-direction: column; gap: 8px; }
  .issue-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 5px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
  }
  .issue-sev {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .sev-critical { background: rgba(239,68,68,0.15);  color: var(--red); }
  .sev-error    { background: rgba(239,68,68,0.10);  color: #fca5a5; }
  .sev-warning  { background: rgba(245,158,11,0.12); color: var(--yellow); }
  .sev-low      { background: rgba(255,255,255,0.06); color: var(--dim); }
  .sev-info     { background: rgba(59,130,246,0.10); color: #93c5fd; }
  .issue-msg  { color: var(--muted); flex: 1; line-height: 1.5; }
  .issue-file { font-family: var(--mono); color: var(--dim); font-size: 10px; margin-top: 2px; }

  /* ── Console log ── */
  #console-log {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    max-height: 320px;
    overflow-y: auto;
    padding: 0 4px;
  }
  #console-log .cl { display: flex; gap: 10px; padding: 1px 0; }
  #console-log .cl .t { color: var(--dim); flex-shrink: 0; }
  #console-log .cl .ag {
    flex-shrink: 0; width: 90px; font-size: 10px;
    letter-spacing: 0.06em; text-transform: uppercase; padding-top: 1px;
  }
  .ag-code-review { color: var(--blue); }
  .ag-auto-fix    { color: #a78bfa; }
  .ag-yc-audit    { color: var(--gold); }
  .ag-system      { color: var(--dim); }
  #console-log .cl .m { flex: 1; white-space: pre-wrap; word-break: break-all; }

  /* ── Waiting state ── */
  #waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    color: var(--dim);
    gap: 12px;
    text-align: center;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(255,255,255,0.08);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
    70%  { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  }
  .agent-card.running { animation: pulse-ring 1.8s ease-out infinite; }
</style>
</head>
<body>

<header>
  <span class="logo">LUMINA</span>
  <span class="title">CI/CD · Agent Dashboard</span>
  <span class="spacer"></span>
  <span id="elapsed">00:00</span>
  <span id="connection-badge">Connecting…</span>
</header>

<main>
  <div class="left">

    <!-- Decision banner (hidden until done) -->
    <div id="decision-banner">
      <div id="decision-icon"></div>
      <div>
        <div id="decision-title"></div>
        <div id="decision-reason"></div>
      </div>
    </div>

    <!-- Waiting overlay -->
    <div id="waiting">
      <div class="spinner"></div>
      <div>Waiting for pipeline to start…</div>
      <div style="font-size:11px">Run <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px">git commit</code> to trigger the agents</div>
    </div>

    <!-- Agent cards (hidden until pipeline starts) -->
    <div id="agents" style="display:none;flex-direction:column;gap:16px"></div>

    <!-- Issues -->
    <div id="issues-card" class="card" style="display:none">
      <div class="card-header">
        <div class="card-title">Issues Detected</div>
        <span id="issues-count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
      </div>
      <div class="card-body" style="padding:14px">
        <div id="issues-list"></div>
      </div>
    </div>

  </div>

  <div class="right">

    <!-- Summary stats -->
    <div id="stats-card" class="card" style="display:none">
      <div class="card-header"><div class="card-title">Audit Stats</div></div>
      <div class="card-body">
        <div class="stats-grid">
          <div class="stat-cell"><div class="stat-num" id="s-score">—</div><div class="stat-lbl">Score</div></div>
          <div class="stat-cell"><div class="stat-num" id="s-grade">—</div><div class="stat-lbl">Grade</div></div>
          <div class="stat-cell"><div class="stat-num" id="s-critical">—</div><div class="stat-lbl">Critical</div></div>
          <div class="stat-cell"><div class="stat-num" id="s-high">—</div><div class="stat-lbl">High</div></div>
          <div class="stat-cell"><div class="stat-num" id="s-passed">—</div><div class="stat-lbl">Passed</div></div>
          <div class="stat-cell"><div class="stat-num" id="s-fixed">—</div><div class="stat-lbl">Auto-fixed</div></div>
        </div>
      </div>
    </div>

    <!-- Live console -->
    <div class="card">
      <div class="card-header"><div class="card-title">Live Console</div></div>
      <div class="card-body" style="padding:14px 18px">
        <div id="console-log">
          <div id="console-placeholder" style="color:var(--dim);font-size:11px">No output yet…</div>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    agents: {},       // id → { id, label, status, logs, progress }
    issues: [],
    auditResult: null,
    fixResult: null,
    decision: null,
    startTs: null,
  }

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const $agents    = document.getElementById('agents')
  const $waiting   = document.getElementById('waiting')
  const $decision  = document.getElementById('decision-banner')
  const $console   = document.getElementById('console-log')
  const $placeholder = document.getElementById('console-placeholder')
  const $statsCard = document.getElementById('stats-card')
  const $issuesCard= document.getElementById('issues-card')

  // ── Timer ──────────────────────────────────────────────────────────────────
  let timerInterval = null
  function startTimer() {
    state.startTs = Date.now()
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - state.startTs) / 1000)
      const mm = String(Math.floor(s / 60)).padStart(2, '0')
      const ss = String(s % 60).padStart(2, '0')
      document.getElementById('elapsed').textContent = `${mm}:${ss}`
    }, 500)
  }

  // ── Console log ───────────────────────────────────────────────────────────
  function appendConsole(agent, message) {
    if ($placeholder) $placeholder.remove()
    const now  = new Date()
    const time = `${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).slice(0,2)}`
    const agClass = `ag-${agent ?? 'system'}`

    const cl = document.createElement('div')
    cl.className = 'cl'
    cl.innerHTML = `<span class="t">${time}</span><span class="ag ${agClass}">${agent ?? 'system'}</span><span class="m">${escHtml(message)}</span>`
    $console.appendChild(cl)
    $console.scrollTop = $console.scrollHeight
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  // ── Agent card ────────────────────────────────────────────────────────────
  const AGENT_META = {
    'code-review': { emoji: '🔍', name: 'Code Review' },
    'auto-fix':    { emoji: '🔧', name: 'Auto-Fix' },
    'yc-audit':    { emoji: '📋', name: 'YC Audit' },
  }

  function getOrCreateCard(id, label) {
    if (state.agents[id]) return document.getElementById(`card-${id}`)

    const meta = AGENT_META[id] ?? { emoji: '⚙️', name: label }
    state.agents[id] = { id, label, status: 'pending', logs: [], progress: 0 }

    const card = document.createElement('div')
    card.id = `card-${id}`
    card.className = 'agent-card pending'
    card.innerHTML = `
      <div class="agent-header">
        <div class="agent-icon">${meta.emoji}</div>
        <div>
          <div class="agent-name">${meta.name}</div>
          <div class="agent-label" id="lbl-${id}">Waiting…</div>
        </div>
        <div class="agent-badge" id="badge-${id}">PENDING</div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="prog-${id}"></div></div>
      <div class="agent-logs" id="logs-${id}"></div>
    `
    $agents.appendChild(card)
    return card
  }

  function setAgentStatus(id, status, label) {
    const card = document.getElementById(`card-${id}`)
    if (!card) return
    card.className = `agent-card ${status}`
    const badge = document.getElementById(`badge-${id}`)
    if (badge) badge.textContent = status.toUpperCase()
    if (label) document.getElementById(`lbl-${id}`).textContent = label
    if (status === 'running') {
      animateProgress(id)
    }
  }

  function animateProgress(id) {
    const bar = document.getElementById(`prog-${id}`)
    if (!bar) return
    let pct = 0
    const iv = setInterval(() => {
      pct = Math.min(pct + Math.random() * 8, 85)
      bar.style.width = pct + '%'
      if (!document.getElementById(`card-${id}`)?.classList.contains('running')) {
        clearInterval(iv)
      }
    }, 200)
  }

  function appendAgentLog(id, message) {
    const logs = document.getElementById(`logs-${id}`)
    if (!logs) return
    const line = document.createElement('div')
    line.className = 'log-line'
    if (/critical|secret|blocked/i.test(message)) line.classList.add('critical')
    else if (/error|fail|✗/i.test(message)) line.classList.add('critical')
    else if (/warn|⚠/i.test(message)) line.classList.add('warn')
    else if (/✓|pass|fixed/i.test(message)) line.classList.add('ok')
    line.textContent = message
    logs.appendChild(line)
    logs.scrollTop = logs.scrollHeight
  }

  // ── Issues rendering ──────────────────────────────────────────────────────
  function renderIssues(issues) {
    if (!issues.length) return
    $issuesCard.style.display = ''
    document.getElementById('issues-count').textContent = `${issues.length} total`
    const list = document.getElementById('issues-list')
    list.innerHTML = ''
    issues.slice(0, 30).forEach(issue => {
      const row = document.createElement('div')
      row.className = 'issue-row'
      row.innerHTML = `
        <span class="issue-sev sev-${issue.severity ?? 'low'}">${issue.severity ?? 'low'}</span>
        <div>
          <div class="issue-msg">${escHtml(issue.message)}</div>
          <div class="issue-file">${escHtml(issue.file ?? '')}${issue.line ? `:${issue.line}` : ''}</div>
        </div>
      `
      list.appendChild(row)
    })
    if (issues.length > 30) {
      const more = document.createElement('div')
      more.style.cssText = 'text-align:center;font-size:11px;color:var(--dim);padding:8px 0'
      more.textContent = `+${issues.length - 30} more`
      list.appendChild(more)
    }
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function renderStats(audit, fix) {
    $statsCard.style.display = ''
    const set = (id, val, cls) => {
      const el = document.getElementById(id)
      el.textContent = val
      if (cls) el.className = `stat-num ${cls}`
    }
    set('s-score',    audit?.score    ?? '—', audit?.score >= 80 ? 'green' : 'red')
    set('s-grade',    audit?.grade    ?? '—', '')
    set('s-critical', audit?.critical ?? '—', audit?.critical > 0 ? 'red' : 'green')
    set('s-high',     audit?.high     ?? '—', audit?.high > 0 ? 'yellow' : 'green')
    set('s-passed',   audit?.passed   ?? '—', 'green')
    set('s-fixed',    fix?.fixed?.length ?? '—', fix?.fixed?.length > 0 ? 'blue' : '')
  }

  // ── Decision banner ───────────────────────────────────────────────────────
  function renderDecision(decision) {
    $decision.style.display = 'flex'
    $decision.className = decision.approved ? 'approved' : 'rejected'
    document.getElementById('decision-icon').textContent = decision.approved ? '✅' : '❌'
    document.getElementById('decision-title').textContent = decision.approved ? 'APPROVED — Commit allowed' : 'REJECTED — Fix issues before committing'
    document.getElementById('decision-reason').textContent = decision.reason ?? ''
    if (timerInterval) clearInterval(timerInterval)
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  const badge = document.getElementById('connection-badge')
  let ws, reconnectTimer

  function connect() {
    ws = new WebSocket(`ws://localhost:3456`)

    ws.onopen = () => {
      badge.textContent = 'Connected'
      badge.className = 'connected'
    }

    ws.onclose = () => {
      badge.textContent = 'Disconnected'
      badge.className = ''
      reconnectTimer = setTimeout(connect, 2000)
    }

    ws.onerror = () => {
      badge.textContent = 'Error'
    }

    ws.onmessage = ({ data }) => {
      let msg
      try { msg = JSON.parse(data) } catch { return }
      handleMessage(msg)
    }
  }

  function handleMessage(msg) {
    const { type } = msg

    if (type === 'orchestrator:start') {
      $waiting.style.display = 'none'
      $agents.style.display  = 'flex'
      startTimer()
      ;(msg.agents ?? []).forEach(id => getOrCreateCard(id, id))
      appendConsole('system', 'Pipeline started — ' + (msg.agents ?? []).join(', '))
    }

    if (type === 'agent:start') {
      getOrCreateCard(msg.agent, msg.label)
      setAgentStatus(msg.agent, 'running', 'Running…')
      appendConsole(msg.agent, `▶ ${msg.label}`)
    }

    if (type === 'agent:log') {
      appendAgentLog(msg.agent, msg.message)
      appendConsole(msg.agent, msg.message)
    }

    if (type === 'agent:done') {
      const r = msg.result ?? {}
      const status = r.status === 'fail' ? 'fail' : 'pass'
      setAgentStatus(msg.agent, status, status === 'pass' ? 'Completed' : 'Failed')
      appendConsole(msg.agent, `${status === 'pass' ? '✓' : '✗'} ${msg.label} — ${status.toUpperCase()}`)

      // Store results for stats
      if (msg.agent === 'yc-audit')  state.auditResult = r
      if (msg.agent === 'auto-fix')  state.fixResult   = r
      if (msg.agent === 'code-review') {
        if (r.issues?.length) {
          state.issues = r.issues
          renderIssues(r.issues)
        }
      }
      if (state.auditResult) renderStats(state.auditResult, state.fixResult)
    }

    if (type === 'orchestrator:decision') {
      renderDecision(msg)
    }
  }

  connect()
</script>
</body>
</html>
